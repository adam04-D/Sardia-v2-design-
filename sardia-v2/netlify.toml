[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy the API under the canonical frontend domain so the auth cookie is
# first-party (cross-site cookies are blocked by Safari and increasingly by
# Chrome). Must come BEFORE the SPA fallback so /api/* doesn't get swallowed.
[[redirects]]
  from = "/api/*"
  to = "https://sardia-backend-sql.onrender.com/api/:splat"
  status = 200
  force = true

# Proxy dynamic feeds from the backend under the canonical frontend domain.
[[redirects]]
  from = "/sitemap.xml"
  to = "https://sardia-backend-sql.onrender.com/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/rss.xml"
  to = "https://sardia-backend-sql.onrender.com/rss.xml"
  status = 200
  force = true

# SPA fallback — every route renders index.html so client router can handle it
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache on hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache + security headers on HTML
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://res.cloudinary.com https://images.unsplash.com; connect-src 'self' https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
