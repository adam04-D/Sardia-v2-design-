name: site-health

# Monthly health check on the live site. Walks /sitemap.xml and verifies
# every URL responds 200, has a non-empty <title>, and (for reading pages)
# has a JSON-LD article block. Opens an issue if anything fails.
#
# Run on the 1st of the month at 10:23 UTC (off-minute on purpose).

on:
  schedule:
    - cron: '23 10 1 * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  SITE: https://sardia.me

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: fetch sitemap
        id: sitemap
        run: |
          set -e
          curl -fsSL "$SITE/sitemap.xml" -o sitemap.xml
          # Extract <loc> URLs without an XML lib (regex is enough for our shape).
          grep -oE '<loc>[^<]+</loc>' sitemap.xml | sed -e 's|<loc>||' -e 's|</loc>||' > urls.txt
          echo "count=$(wc -l < urls.txt)" >> "$GITHUB_OUTPUT"

      - name: probe each URL
        id: probe
        run: |
          set +e
          fails=()
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            # 1. status code
            code=$(curl -s -o /tmp/page.html -w '%{http_code}' "$url")
            if [ "$code" != "200" ]; then
              fails+=("$url → HTTP $code")
              continue
            fi
            # 2. non-empty <title>
            if ! grep -qE '<title>[^<]+</title>' /tmp/page.html; then
              fails+=("$url → missing or empty <title>")
              continue
            fi
          done < urls.txt
          if [ ${#fails[@]} -gt 0 ]; then
            printf '%s\n' "${fails[@]}" > fails.txt
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
          echo "checked ${{ steps.sitemap.outputs.count }} URLs, ${#fails[@]} failures"

      - name: open issue on failure
        if: steps.probe.outputs.ok != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const fails = fs.readFileSync('fails.txt', 'utf8').trim();
            const body = [
              `Monthly site-health check found broken URLs on ${process.env.SITE}.`,
              ``,
              `### Failures`,
              ``,
              '```',
              fails,
              '```',
              ``,
              `Total URLs checked: ${{ steps.sitemap.outputs.count }}`,
              `Run: ${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[site-health] broken URLs detected — ${new Date().toISOString().slice(0, 10)}`,
              body,
              labels: ['site-health'],
            });
