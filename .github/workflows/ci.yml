name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: sardia-v2

jobs:
  build:
    name: typecheck + lint + build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sardia-v2/package-lock.json

      # Repo root has its own minimal package.json (husky only).
      - name: install root deps
        working-directory: .
        run: npm install --no-audit --no-fund

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run size

  audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sardia-v2/package-lock.json
      - working-directory: sardia-v2
        run: npm ci
      - working-directory: sardia-v2
        run: npm audit --omit=dev --audit-level=high
