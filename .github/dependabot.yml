version: 2
updates:
  - package-ecosystem: npm
    directory: /sardia-v2
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Africa/Casablanca
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: deps
      include: scope
    groups:
      dev-deps:
        dependency-type: development
        update-types: [minor, patch]
      prod-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
    ignore:
      # React 19 + ecosystem still settling — pin majors and review
      # individually rather than letting dependabot open a PR.
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
    commit-message:
      prefix: ci(deps)
